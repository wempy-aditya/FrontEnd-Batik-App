{% extends 'base.html' %}
{% block content %}
<style>
  .contact-form-area {
    display: grid;
    grid-template-columns: 1fr;
    row-gap: 25px;
  }

  @media screen and (min-width: 585px) {
    .contact-form-area {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media screen and (min-width: 790px) {
    .contact-form-area {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media screen and (min-width: 995px) {
    .contact-form-area {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
  }

  @media screen and (min-width: 1200px) {
    .contact-form-area {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
    }
  }
</style>

<!-- Page Title ============================================= -->
<section id="page-title">
  <div class="container clearfix">
    <h1>Application Product Details</h1>
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="https://batik.umm.ac.id/">Home</a></li>
      <li class="breadcrumb-item active" aria-current="page">Product</li>
      <li class="breadcrumb-item active" aria-current="page">{{product_name}}</li>
    </ol>
  </div>
</section><!-- #page-title end -->


<!-- Table-section -->
<section class="contact-section d-flex justify-content-center" id="result" style="padding-bottom: 50px; margin-top: 65px;">
  <div class="col-lg-10 px-5">
      <div class="fancy-title title-border title-center mb-5">
        <h3>Query Patch Batik</h3>
      </div>
      <div class="col-lg-12 col-md-12 col-sm-12 sidebar-column" style="margin-bottom: 10px;" align="center">
        <div class="sidebar-content" style="display: inline-block !important; padding: 0; background: none !important;">
          <img src="{{ url_for('static', filename='patch/'+patch_a) }}" alt="" class="img-fluid" style="width:128px; margin: auto; display: block">
          <p style="font-size:18px;text-align:center;">Patch A</p>
        </div>
        <div class="sidebar-content" style="display: inline-block !important; padding: 0; margin-left: 10px;  background: none !important;">
          <img src="{{ url_for('static', filename='patch/'+patch_b) }}" alt="" class="img-fluid" style="width:128px; margin: auto; display: block">
          <p style="font-size:18px;text-align:center;">Patch B</p>
        </div>
      </div>

      <div class="fancy-title title-border title-center mb-5" style="margin-top: 45px;">
        <h3>Model</h3>
      </div>
      <div class="row justify-content-center">
        {% for x in range(model_names|length) %}
        <div class="col-md-3 col-xs-3 mx-2 my-2" align="center">
          <div class="fancy-title title-border title-center">
            <h5>{{model_names[x]}}</h5>
          </div>
          <img src="{{ url_for('static', filename=result_paths[x]) }}" alt="" width="512px">
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
<!-- final-section end -->
{% endblock %}
